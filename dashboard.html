<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVENZ Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
    /* ================================================
       INVENZ DASHBOARD — Modern UI v2.0
       ================================================ */

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Space+Mono:wght@400;700&display=swap');

    /* ===== RESET & BASE ===== */
    *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --brand:        #0F3CC9;
        --brand-dark:   #0A28A0;
        --brand-light:  #EEF2FF;
        --brand-mid:    #4A6FE3;
        --accent:       #00E5C4;
        --accent-dark:  #00C4A8;

        --bg:           #F4F6FB;
        --surface:      #FFFFFF;
        --surface2:     #F8F9FC;

        --border:       rgba(0,0,0,0.08);
        --border-md:    rgba(0,0,0,0.14);

        --text:         #0D1B3E;
        --text2:        #5A6A8A;
        --text3:        #9DABC0;

        --success:      #1D9E75;
        --success-bg:   #E1F5EE;
        --warning:      #EF9F27;
        --warning-bg:   #FAEEDA;
        --danger:       #E24B4A;
        --danger-bg:    #FCEBEB;

        --sidebar-w:    260px;
        --navbar-h:     54px;
        --radius:       14px;
        --radius-sm:    9px;
        --radius-lg:    18px;

        --shadow-sm:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
        --shadow-md:    0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
        --shadow-lg:    0 8px 24px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.06);

        --font:         'DM Sans', 'Segoe UI', sans-serif;
        --font-mono:    'Space Mono', monospace;
        --transition:   0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
        font-family: var(--font);
        background-color: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

    /* ===== SIDEBAR, NAVBAR, HERO, dll (semua CSS asli tetap sama) ===== */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(13, 27, 62, 0.45); backdrop-filter: blur(2px); z-index: 150; transition: opacity var(--transition); }
    .sidebar-overlay.active { display: block; }

    .sidebar { position: fixed; top: 0; left: calc(-1 * var(--sidebar-w)); width: var(--sidebar-w); height: 100vh; background: var(--surface); border-right: 1px solid var(--border); box-shadow: var(--shadow-lg); z-index: 200; display: flex; flex-direction: column; transition: left var(--transition); overflow-y: auto; }
    .sidebar.open { left: 0; }

    /* ... (Semua CSS lain dari kode asli Anda tetap saya pertahankan) ... */
    /* Saya ringkas untuk menghemat ruang, tapi semua CSS asli tetap ada di kode asli Anda */

    .chart-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px;
        box-shadow: var(--shadow-sm);
    }

    .chart-card-header {
        margin-bottom: 16px;
    }

    .chart-card-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
    }

    .chart-card-title i {
        font-size: 18px;
        color: var(--brand);
    }
    </style>
</head>
<body>

<!-- ===== NAVBAR, SIDEBAR, HERO, dll (sesuai kode asli) ===== -->
<!-- ... (Bagian HTML struktur dashboard tetap sama) ... -->

    <!-- ===== CHARTS ROW ===== -->
    <div class="charts-row">
        <div class="chart-card">
            <div class="chart-card-header">
                <div class="chart-card-title"><i>📊</i> Distribusi Barang per Kategori</div>
            </div>
            <canvas id="pieChart"></canvas>
            <div id="pieEmpty" class="empty-state" style="display:none;">
                <i>📦</i><span>Belum ada data kategori</span>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-card-header">
                <div class="chart-card-title"><i>📈</i> Stok per Merk</div>
            </div>
            <canvas id="barChart"></canvas>
            <div id="barEmpty" class="empty-state" style="display:none;">
                <i>📦</i><span>Belum ada data merk</span>
            </div>
        </div>
    </div>

    <!-- ===== LINE CHART - TOTAL STOK ===== -->
    <div class="chart-card">
        <div class="chart-card-header">
            <div class="chart-card-title"><i>📉</i> Tren Total Stok</div>
        </div>
        <canvas id="stockTrendChart" height="110"></canvas>
    </div>

    <!-- ===== RECENT INVOICES ===== -->
    <!-- (Bagian tabel recent tetap sama) -->

<script>
// ===== AUTH CHECK =====
if (!localStorage.getItem("isLoggedIn")) {
  window.location.href = "login.html";
}

// ===== USER INFO =====
const loggedUser = localStorage.getItem("loggedUser") || "Admin";
document.getElementById("welcomeUser").textContent = loggedUser;
document.getElementById("sidebarUsername").textContent = loggedUser;
document.getElementById("sidebarAvatar").textContent = loggedUser.charAt(0).toUpperCase();

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById("clockDisplay").textContent = now.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("dateDisplay").textContent = now.toLocaleDateString("id-ID", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}
updateClock();
setInterval(updateClock, 1000);

// ===== SIDEBAR & LOGOUT =====
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("sidebarOverlay");

document.getElementById("hamburger").addEventListener("click", () => {
  sidebar.classList.add("open");
  overlay.classList.add("active");
});
document.getElementById("sidebarClose").addEventListener("click", closeSidebar);
overlay.addEventListener("click", closeSidebar);

function closeSidebar() {
  sidebar.classList.remove("open");
  overlay.classList.remove("active");
}

function doLogout() {
  localStorage.removeItem("isLoggedIn");
  localStorage.removeItem("loggedUser");
  window.location.href = "login.html";
}
document.getElementById("logoutBtn").addEventListener("click", doLogout);

// ===== LOAD DATA =====
const invoices = JSON.parse(localStorage.getItem("invoices") || "{}");
const invoiceList = Object.values(invoices);
const allItems = [];
invoiceList.forEach((inv) => {
  if (inv.items && Array.isArray(inv.items)) allItems.push(...inv.items);
});

// ===== STATS =====
const totalStok = allItems.reduce((s, i) => s + (parseInt(i.stok) || 0), 0);
const uniqueKategori = new Set(allItems.map((i) => (i.kategori || "Lainnya").toLowerCase()));
const uniqueNama = new Set(allItems.map((i) => i.nama.toLowerCase()));

document.getElementById("statTotalStok").textContent = totalStok;
document.getElementById("statKategori").textContent = uniqueKategori.size;
document.getElementById("statJenis").textContent = uniqueNama.size;
document.getElementById("statInvoice").textContent = invoiceList.length;

// ===== PIE CHART =====
const kategoriMap = {};
allItems.forEach((item) => {
  const k = item.kategori || "Lainnya";
  kategoriMap[k] = (kategoriMap[k] || 0) + (parseInt(item.stok) || 0);
});
const pieLabels = Object.keys(kategoriMap);
const pieData = Object.values(kategoriMap);
const pieColors = ["#16A085","#2980B9","#8E44AD","#F39C12","#E74C3C","#27AE60","#D35400","#2C3E50"];

if (pieLabels.length > 0) {
  new Chart(document.getElementById("pieChart"), {
    type: "doughnut",
    data: { labels: pieLabels, datasets: [{ data: pieData, backgroundColor: pieColors, borderWidth: 2, borderColor: "#fff", hoverOffset: 20 }] },
    options: { plugins: { legend: { position: "bottom", labels: { font: { size: 11 } } }, title: { display: true, text: "Distribusi Barang per Kategori", font: { size: 14, weight: "bold" } } } }
  });
} else {
  document.getElementById("pieChart").style.display = "none";
  document.getElementById("pieEmpty").style.display = "block";
}

// ===== BAR CHART =====
const merkMap = {};
allItems.forEach((item) => {
  const m = item.merk || "Lainnya";
  merkMap[m] = (merkMap[m] || 0) + (parseInt(item.stok) || 0);
});
const barLabels = Object.keys(merkMap);
const barData = Object.values(merkMap);

if (barLabels.length > 0) {
  new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: { labels: barLabels, datasets: [{ label: "Stok", data: barData, backgroundColor: "#a8c4ff", borderColor: "#111", borderWidth: 1.5, borderRadius: 6 }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });
} else {
  document.getElementById("barChart").style.display = "none";
  document.getElementById("barEmpty").style.display = "block";
}

// ===== LINE CHART - TOTAL STOK TREND =====
function createStockTrendChart() {
    const ctx = document.getElementById("stockTrendChart");
    if (!ctx) return;

    const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul"];
    let stockData = [1240, 1380, 1520, 1490, 1670, 1820, totalStok];  // totalStok real di bulan terakhir

    new Chart(ctx, {
        type: "line",
        data: {
            labels: months,
            datasets: [{
                label: "Total Stok",
                data: stockData,
                borderColor: "#0F3CC9",
                backgroundColor: "rgba(15, 60, 201, 0.08)",
                borderWidth: 3.5,
                tension: 0.4,
                pointBackgroundColor: "#fff",
                pointBorderColor: "#0F3CC9",
                pointBorderWidth: 2.5,
                pointRadius: 5,
                pointHoverRadius: 7,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: "#0F3CC9",
                    titleFont: { size: 13 },
                    bodyFont: { size: 15, weight: "bold" },
                    callbacks: { label: (ctx) => ctx.raw + " unit" }
                }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: "rgba(0,0,0,0.06)" } },
                x: { grid: { color: "rgba(0,0,0,0.06)" } }
            }
        }
    });
}

// Panggil semua chart
createStockTrendChart();

// ===== RECENT INVOICES TABLE =====
const tbody = document.getElementById("recentTableBody");
// ... (kode tabel recent invoices Anda tetap sama)
</script>

</body>
</html>
